name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  smoke-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Run raw bindings example
        run: cargo run -p zvec --example basic

      - name: Test safe wrapper crate
        run: cargo test -p zvec-rs --all-features

  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;26.1.10909125"

      - name: Set ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Add Rust Android target
        run: rustup target add aarch64-linux-android

      - name: Configure Android linker
        run: |
          mkdir -p .cargo
          LINKER="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          printf '[target.aarch64-linux-android]\nlinker = "%s"\n' "$LINKER" > .cargo/config.toml

      - name: Build for Android
        run: |
          export BINDGEN_EXTRA_CLANG_ARGS_aarch64_linux_android="--sysroot=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          cargo build -p zvec --target aarch64-linux-android --example basic
